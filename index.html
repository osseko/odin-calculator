<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="calcstyle.css">
</head>
<body>
    <div class="calcBody">

    <h1 id="header">Calculator</h1>

    <div class="showBox"> <input id="showNum" > </input> </div>
   
    <!-- <input id="oprPrss"></input> displays operation pressed -->
    <div id="calcFace">
        <div id="numBed">
            <button class="numPad" id="1" value="1">1</button>
            <button class="numPad" id="2" value="2">2</button>
            <button class="numPad" id="3" value="3">3</button>
            <button class="numPad" id="4" value="4">4</button>
            <button class="numPad" id="5" value="5">5</button>
            <button class="numPad" id="6" value="6">6</button>
            <button class="numPad" id="7" value="7">7</button>
            <button class="numPad" id="8" value="8">8</button>
            <button class="numPad" id="9" value="9">9</button>
            <button class="numPad" id="0" value="0">0</button>
            <button class="numPad" id="dot" value="." onclick="disableDot()">.</button>
        </div>

        <div id="oprBed">
            <button class="operation" id="add" value="add" onclick="enableDot()">+</button>
            <button class="operation" id="subtract" value="subtract"onclick="enableDot()">-</button>
            <button class="operation" id="divide" value="divide" onclick="enableDot()">/</button>
            <button class="operation" id="multiply" value="multiply" onclick="enableDot()">*</button>        
            <button class="operation" id="equals" value="equals" onclick="enableDot()">=</button>
            <button class="backspace" id="backspace" onclick="bckSpace()">BCKSPCE</button>
            <button class="clear" id="clear" value="clear" onclick="enableDot(), clearInput()">clear</button> 
        </div>  
    </div>
    </div>

    <script src="calculator.js">
    </script>

</body>
</html>
